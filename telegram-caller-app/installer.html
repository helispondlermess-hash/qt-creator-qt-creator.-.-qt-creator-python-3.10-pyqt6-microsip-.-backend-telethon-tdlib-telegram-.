<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Caller - Установщик</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            max-width: 700px;
            padding: 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 24px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .logo { font-size: 4rem; text-align: center; margin-bottom: 10px; }
        h1 { font-size: 2.5rem; margin-bottom: 5px; text-align: center; }
        .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; }
        .options { display: flex; gap: 20px; margin-top: 30px; }
        .option {
            flex: 1;
            padding: 30px 20px;
            background: rgba(255,255,255,0.08);
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
            text-align: center;
        }
        .option:hover { 
            transform: translateY(-8px); 
            border-color: #6366f1; 
            background: rgba(99, 102, 241, 0.2);
        }
        .option h2 { font-size: 1.2rem; margin-bottom: 10px; }
        .option p { color: #aaa; font-size: 0.85rem; line-height: 1.5; }
        .icon { font-size: 3.5rem; margin-bottom: 15px; display: block; }
        .status {
            margin-top: 30px;
            padding: 15px;
            background: rgba(99, 102, 241, 0.2);
            border-radius: 10px;
            text-align: center;
            font-size: 0.9rem;
        }
        .version { text-align: center; margin-top: 30px; color: #666; font-size: 0.8rem; }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            background: #22c55e;
            border-radius: 20px;
            font-size: 0.75rem;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">📱</div>
        <h1>Telegram Caller</h1>
        <p class="subtitle">Универсальный клиент для звонков</p>
        
        <div class="options">
            <div class="option" onclick="startWeb()">
                <span class="icon">🌐</span>
                <h2>Веб-версия</h2>
                <p>Запустить через браузер<br>Локальный сервер</p>
                <span class="badge">Рекомендуется</span>
            </div>
            <div class="option" onclick="startDesktop()">
                <span class="icon">🖥️</span>
                <h2>Десктоп приложение</h2>
                <p>Запустить .exe файл<br>Полноценное приложение</p>
                <span class="badge">Требует сборки</span>
            </div>
        </div>
        
        <div class="status" id="status">
            Выберите версию для запуска
        </div>
        
        <p class="version">Версия 1.0.0 | Установщик</p>
    </div>

    <script>
        function startWeb() {
            document.getElementById('status').innerHTML = '🌐 Запуск веб-версии...';
            setTimeout(() => {
                window.location.href = 'http://localhost:3000';
            }, 1000);
        }
        
        function startDesktop() {
            document.getElementById('status').innerHTML = '🖥️ Запуск десктоп приложения...';
            setTimeout(() => {
                window.location.href = 'launcher.bat';
            }, 1000);
        }
    </script>
</body>
</html>
